services:
  mongo:
    image: mongo:7
    container_name: rpg_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: rpg
      MONGO_INITDB_ROOT_PASSWORD: rpg123
      MONGO_INITDB_DATABASE: rpg_db
    volumes:
      - mongo_data:/data/db

  mongo-express:
    image: mongo-express:latest
    container_name: rpg_mongo_ui
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: rpg
      ME_CONFIG_MONGODB_ADMINPASSWORD: rpg123
      ME_CONFIG_MONGODB_URL: mongodb://rpg:rpg123@mongo:27017/
      ME_CONFIG_BASICAUTH: false
    depends_on:
      - mongo

volumes:
  mongo_data:
